mission_id: cv_level3_q5_mini_dl_framework
name: "Q5. Mini Deep Learning Framework + Performance Diagnostics"
description: "Tensor autograd, neural network layers, training loop, bias/variance diagnostics"
difficulty: 3
qnum: 5
time_limit: 120
passing_score: 0.85

data_dir: data
submission_type: complex_folder
required_files:
  - tensor.py
  - autograd.py
  - layers.py
  - trainer.py
  - diagnostics.py
  - main.py
result_file: result_q5.json

validators:
  - file: validator.py

curriculum:
  - mission_18: "linear algebra, backpropagation"
  - mission_25: "Tensor, AutoGrad"
  - mission_26: "bias/variance diagnosis"

ai_traps:
  - "NumPy only (no PyTorch, TensorFlow, sklearn)"
  - "gradient accumulation: += not ="
  - "topological sort for backward pass"
  - "He initialization: sqrt(2/fan_in)"
  - "BCE loss requires log clipping for numerical stability"

checks:
  - id: "structure"
    description: "AST check: Tensor class, Linear/Sequential, diagnose_bias_variance"
    points: 15
    tests: 3
  - id: "tensor_ops"
    description: "Tensor add/mul/matmul, backward, relu/sigmoid, sum"
    points: 25
    tests: 4
  - id: "layers"
    description: "Linear forward shape, Sequential chaining"
    points: 15
    tests: 2
  - id: "trainer"
    description: "Training loop produces decreasing losses"
    points: 10
    tests: 1
  - id: "diagnostics"
    description: "Bias/variance diagnosis, gradient check"
    points: 15
    tests: 2
  - id: "result"
    description: "result_q5.json structure and metric thresholds"
    points: 20
    tests: 2
